<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 서재 — BookPath</title>
    <style>
        :root {
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --muted: #64748b;
            --border: #e2e8f0;
            --primary: #4f46e5;
            --radius: 16px;
            --shadow: 0 2px 16px rgba(0,0,0,0.07);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── Header ── */
        header {
            background: white;
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 1px 8px rgba(0,0,0,0.06);
        }
        .logo { font-size: 1.4rem; font-weight: 800; color: var(--primary); text-decoration: none; }
        .logo span { font-weight: 400; font-size: 0.9rem; color: var(--muted); margin-left: 0.5rem; }
        .explore-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.45rem 1.1rem;
            background: var(--primary);
            color: white;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            text-decoration: none;
            transition: background 0.15s;
        }
        .explore-btn:hover { background: #4338ca; }

        /* ── Main ── */
        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem 2rem 4rem;
        }

        /* ── Stats Bar ── */
        .stats-bar {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            background: white;
            border-radius: var(--radius);
            padding: 1.1rem 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow);
            flex-wrap: wrap;
        }
        .stat {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .stat-num { font-size: 1.4rem; font-weight: 800; color: var(--primary); }
        .stat-label { font-size: 0.82rem; color: var(--muted); }
        .stat-divider { width: 1px; height: 32px; background: var(--border); }

        /* ── Filter ── */
        .filter-wrap {
            margin-bottom: 1.25rem;
        }
        .filter-label {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--muted);
            margin-bottom: 0.6rem;
        }
        .chip-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.45rem;
        }
        .chip {
            padding: 0.38rem 0.9rem;
            border-radius: 20px;
            border: 2px solid var(--border);
            background: white;
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 500;
            transition: all 0.15s;
        }
        .chip:hover { border-color: var(--primary); color: var(--primary); }
        .chip.on { background: var(--primary); border-color: var(--primary); color: white; }
        .chip.all { border-color: var(--primary); color: var(--primary); }
        .chip.all.on { background: var(--primary); color: white; }

        /* ── Sort ── */
        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .result-count { font-size: 0.85rem; color: var(--muted); }
        .sort-select {
            padding: 0.35rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.82rem;
            background: white;
            cursor: pointer;
            color: var(--text);
        }

        /* ── Book Grid ── */
        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1rem;
        }
        .book-card {
            background: white;
            border-radius: 12px;
            padding: 1.1rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            position: relative;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .book-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.1); }
        .book-title {
            font-size: 0.9rem;
            font-weight: 700;
            line-height: 1.45;
            margin-bottom: 0.25rem;
            padding-right: 1.8rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            cursor: pointer;
        }
        .book-title:hover { color: var(--primary); }
        .book-author { font-size: 0.77rem; color: var(--muted); margin-bottom: 0.7rem; }
        .tag-row { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-bottom: 0.7rem; }
        .tag {
            padding: 0.12rem 0.48rem;
            border-radius: 4px;
            font-size: 0.68rem;
            font-weight: 600;
        }
        .tag.career { background: #ede9fe; color: #5b21b6; }
        .tag.student { background: #dbeafe; color: #1d4ed8; }
        .book-date { font-size: 0.7rem; color: #94a3b8; }

        /* ── Remove Button ── */
        .remove-btn {
            position: absolute;
            top: 0.75rem;
            right: 0.75rem;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: none;
            background: #fee2e2;
            color: #ef4444;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
            line-height: 1;
        }
        .remove-btn:hover { background: #fecaca; }

        /* ── Empty State ── */
        .empty {
            text-align: center;
            padding: 5rem 2rem;
            color: var(--muted);
        }
        .empty-icon { font-size: 3.5rem; margin-bottom: 1rem; }
        .empty h2 { font-size: 1.2rem; margin-bottom: 0.5rem; color: var(--text); }
        .empty p { font-size: 0.9rem; margin-bottom: 1.5rem; }
        .empty-link {
            display: inline-block;
            padding: 0.6rem 1.5rem;
            background: var(--primary);
            color: white;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            font-size: 0.9rem;
        }

        /* ── Modal ── */
        #overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }
        #overlay.open { display: flex; }
        .modal {
            background: white;
            border-radius: var(--radius);
            padding: 2rem;
            max-width: 580px;
            width: 92%;
            max-height: 82vh;
            overflow-y: auto;
            position: relative;
        }
        .modal-x {
            position: absolute;
            top: 1rem; right: 1.2rem;
            background: none; border: none;
            font-size: 1.6rem; cursor: pointer;
            color: var(--muted); line-height: 1;
        }
        .modal-x:hover { color: var(--text); }
        .modal-title { font-size: 1.1rem; font-weight: 800; line-height: 1.45; padding-right: 2rem; margin-bottom: 0.3rem; }
        .modal-author { font-size: 0.82rem; color: var(--muted); margin-bottom: 1rem; }
        .modal-sec { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin: 1.1rem 0 0.5rem; }
        .modal-desc { font-size: 0.875rem; line-height: 1.75; color: var(--text); }
        .remove-from-shelf {
            display: block;
            width: 100%;
            margin-top: 1.25rem;
            padding: 0.65rem;
            background: #fee2e2;
            border: none;
            border-radius: 8px;
            color: #ef4444;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }
        .remove-from-shelf:hover { background: #fecaca; }

        @media (max-width: 600px) {
            main { padding: 0.75rem 1rem 3rem; }
            .book-grid { grid-template-columns: 1fr; }
            header { padding: 0 1rem; }
        }
    </style>
</head>
<body>

<header>
    <a class="logo" href="index.html">📚 BookPath<span>책으로 찾는 나의 진로</span></a>
    <a class="explore-btn" href="index.html">+ 도서 탐색하기</a>
</header>

<main>
    <div id="content"></div>
</main>

<div id="overlay" onclick="onOverlayClick(event)">
    <div class="modal">
        <button class="modal-x" onclick="closeModal()">×</button>
        <div id="modal-body"></div>
    </div>
</div>

<script>
const SHELF_KEY = 'bookpath_shelf';

function loadShelf() {
    try { return JSON.parse(localStorage.getItem(SHELF_KEY)) || []; }
    catch { return []; }
}

function saveShelf(shelf) {
    localStorage.setItem(SHELF_KEY, JSON.stringify(shelf));
}

function removeBook(title) {
    const shelf = loadShelf().filter(b => b.title !== title);
    saveShelf(shelf);
    render();
}

function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function cleanAuthor(a) {
    return (a || '저자 미상').replace(/\/\//g, '').trim();
}

// ── 필터 상태 ──────────────────────────────────────────────────────────────────
let curCareer = null;

function toggleFilter(career) {
    curCareer = curCareer === career ? null : career;
    render();
}

// ── 렌더링 ─────────────────────────────────────────────────────────────────────
function render() {
    const shelf = loadShelf();
    const el = document.getElementById('content');

    if (shelf.length === 0) {
        el.innerHTML = `
            <div class="empty">
                <div class="empty-icon">📭</div>
                <h2>서재가 비어있어요</h2>
                <p>마인드맵에서 관심 있는 책을 서재에 담아보세요!</p>
                <a class="empty-link" href="index.html">📚 도서 탐색하러 가기</a>
            </div>`;
        return;
    }

    // 진로 태그 집계
    const careerCounts = {};
    shelf.forEach(b => (b.career_tags || []).forEach(c => {
        careerCounts[c] = (careerCounts[c] || 0) + 1;
    }));
    const careers = Object.entries(careerCounts).sort((a, b) => b[1] - a[1]).map(([c]) => c);

    // 필터 적용
    const shown = curCareer
        ? shelf.filter(b => (b.career_tags || []).includes(curCareer))
        : shelf;

    // 관심 진로 수 (career_tags 중복 제거)
    const uniqueCareers = new Set(shelf.flatMap(b => b.career_tags || []));

    el.innerHTML = `
        <div class="stats-bar">
            <div class="stat">
                <span class="stat-num">${shelf.length}</span>
                <span class="stat-label">담은 책</span>
            </div>
            <div class="stat-divider"></div>
            <div class="stat">
                <span class="stat-num">${uniqueCareers.size}</span>
                <span class="stat-label">관심 진로</span>
            </div>
            <div class="stat-divider"></div>
            <div class="stat">
                <span class="stat-num">${new Set(shelf.map(b => b.kdc?.[0])).size}</span>
                <span class="stat-label">탐색 분야</span>
            </div>
        </div>

        ${careers.length ? `
        <div class="filter-wrap">
            <div class="filter-label">🎯 진로별 보기</div>
            <div class="chip-row">
                <span class="chip all ${!curCareer ? 'on' : ''}" onclick="toggleFilter(null)">전체 ${shelf.length}</span>
                ${careers.map(c =>
                    `<span class="chip ${curCareer === c ? 'on' : ''}" onclick="toggleFilter('${esc(c)}')">${esc(c)} ${careerCounts[c]}</span>`
                ).join('')}
            </div>
        </div>` : ''}

        <div class="toolbar">
            <span class="result-count">${shown.length}권</span>
        </div>

        <div class="book-grid">
            ${shown.map(b => `
            <div class="book-card">
                <button class="remove-btn" onclick="removeBook('${esc(b.title)}')" title="서재에서 제거">×</button>
                <div class="book-title" onclick="openModal('${esc(b.title)}')">${esc(b.title)}</div>
                <div class="book-author">${esc(cleanAuthor(b.author))}</div>
                <div class="tag-row">
                    ${(b.career_tags || []).map(t => `<span class="tag career">${esc(t)}</span>`).join('')}
                    ${(b.student_tags || []).slice(0, 2).map(t => `<span class="tag student">${esc(t)}</span>`).join('')}
                </div>
                <div class="book-date">📅 ${b._saved_at || ''}</div>
            </div>`).join('')}
        </div>`;
}

// ── 모달 ─────────────────────────────────────────────────────────────────────
function openModal(title) {
    const b = loadShelf().find(b => b.title === title);
    if (!b) return;
    document.getElementById('modal-body').innerHTML = `
        <div class="modal-title">${esc(b.title)}</div>
        <div class="modal-author">${esc(cleanAuthor(b.author))}</div>
        ${b.description
            ? `<div class="modal-sec">책 소개</div>
               <div class="modal-desc">${esc(b.description).replace(/\n/g, '<br>')}</div>`
            : ''}
        ${(b.career_tags || []).length
            ? `<div class="modal-sec">🎯 관련 진로</div>
               <div class="tag-row">${b.career_tags.map(t => `<span class="tag career">${esc(t)}</span>`).join('')}</div>`
            : ''}
        ${(b.student_tags || []).length
            ? `<div class="modal-sec">🔖 키워드</div>
               <div class="tag-row">${b.student_tags.map(t => `<span class="tag student">${esc(t)}</span>`).join('')}</div>`
            : ''}
        <button class="remove-from-shelf" onclick="removeBook('${esc(b.title)}'); closeModal()">
            🗑️ 서재에서 제거
        </button>
    `;
    document.getElementById('overlay').classList.add('open');
}

function closeModal() {
    document.getElementById('overlay').classList.remove('open');
}

function onOverlayClick(e) {
    if (e.target === document.getElementById('overlay')) closeModal();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

render();
</script>
</body>
</html>
